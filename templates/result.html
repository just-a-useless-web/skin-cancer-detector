<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Résultat — SkinAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/dashboard">🔬 SkinAI</a>
</nav>

<div class="result-wrap animate">
    <h1 class="page-title mb-4">📊 Résultat du diagnostic</h1>

    <div class="result-card">
        <div class="result-badge {% if result == 'Malignant' %}malignant{% else %}benign{% endif %}">
            {% if result == 'Malignant' %}⚠️{% else %}✅{% endif %}
            {{ result }}
        </div>

        <p class="result-prob">
            Probabilité de malignité : <strong style="color:var(--text)">{{ prob }}%</strong>
        </p>

        <!-- Progress bar -->
        <div style="background:var(--surface2);border-radius:50px;height:8px;margin-bottom:1.5rem;overflow:hidden;">
            <div style="height:100%;width:{{ prob }}%;background:{% if result == 'Malignant' %}var(--danger){% else %}var(--success){% endif %};border-radius:50px;transition:width 1s ease;"></div>
        </div>

        <img src="{{ img }}" class="result-img" alt="Lésion analysée">

        <div style="color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem;">
            ⚠️ Ce diagnostic est une aide à la décision. Consultez un dermatologue.
        </div>

        <div class="d-flex gap-2 justify-content-center">
            <a class="btn btn-primary" href="/predict">🔍 Nouvelle analyse</a>
            <a class="btn btn-secondary" href="/dashboard">← Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
