<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyse — SkinAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/dashboard">🔬 SkinAI</a>
    <a href="/dashboard" class="btn btn-secondary btn-sm">← Retour</a>
</nav>

<div class="predict-wrap animate">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <h1 class="page-title">🩺 Analyse patient</h1>
    <p class="page-sub">Renseignez les informations et soumettez l'image de la lésion.</p>

    <div class="predict-card">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Nom du patient</label>
                <input class="form-control" type="text" name="name" placeholder="Ex: Mohamed Ali" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Âge</label>
                <input class="form-control" type="number" name="age" placeholder="Ex: 42" min="1" max="120" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Image de la lésion</label>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" name="image" accept="image/*" required id="fileInput">
                    <div class="upload-icon">🖼️</div>
                    <p><strong>Cliquez pour choisir</strong> une image</p>
                    <p>JPG, PNG acceptés</p>
                </div>
                <p id="fileName" style="color:var(--accent);font-size:0.85rem;margin-top:0.5rem;display:none;"></p>
            </div>
            <button type="submit" class="btn btn-success w-100" id="submitBtn">
                🔍 Lancer l'analyse
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
    const name = e.target.files[0]?.name;
    if (name) {
        const p = document.getElementById('fileName');
        p.textContent = '✓ ' + name;
        p.style.display = 'block';
    }
});
document.querySelector('form').addEventListener('submit', function() {
    document.getElementById('submitBtn').textContent = '⏳ Analyse en cours...';
    document.getElementById('submitBtn').disabled = true;
});
</script>
</body>
</html>
